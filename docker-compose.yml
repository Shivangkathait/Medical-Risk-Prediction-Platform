version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: novagen_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - prediction_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - novagen_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: novagen_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - novagen_net

volumes:
  prediction_data:

networks:
  novagen_net:
    driver: bridge
